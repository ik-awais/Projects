# backend/alembic.ini

[alembic]
# Path to migration scripts, relative to this file's location
script_location = app/db/migrations

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path additions so "app.*" imports resolve when Alembic runs
prepend_sys_path = .

# Timezone used when rendering revision timestamps inside generated files
timezone = UTC

# Truncate long slugs in auto-generated filenames
truncate_slug_length = 60

# Do not search source dirs recursively for revision files outside versions/
recursive_version_locations = false

# Encoding used when writing migration files
output_encoding = utf-8

# sqlalchemy.url is intentionally left blank here. The real DATABASE_URL is
# injected at runtime by env.py via app.core.config.settings, so the same
# .env-driven configuration used by the application is also used by Alembic.
# This avoids maintaining the connection string in two places.
sqlalchemy.url =

[post_write_hooks]
# No post-write formatting hooks configured. Keeping Alembic's footprint
# minimal per the "no over-engineering" constraint — ruff/black can be run
# manually or via a pre-commit hook outside Alembic's lifecycle.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S