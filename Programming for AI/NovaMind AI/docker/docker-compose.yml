# docker/docker-compose.yml

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: novamind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novamind}
      POSTGRES_USER: ${POSTGRES_USER:-novamind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - novamind_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-novamind} -d ${POSTGRES_DB:-novamind}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - novamind_network

  redis:
    image: redis:7-alpine
    container_name: novamind-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - novamind_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - novamind_network

volumes:
  novamind_postgres_data:
    name: novamind_postgres_data
  novamind_redis_data:
    name: novamind_redis_data

networks:
  novamind_network:
    name: novamind_network
    driver: bridge